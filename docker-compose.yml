services:
  notes-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ${HOST_OBSIDIAN_VAULT_PATH:-./obsidian_vault}:/app/obsidian_vault
    restart: unless-stopped
    command: python -m apps.telegram_bot.main
